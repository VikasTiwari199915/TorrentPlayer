name: Android CI & Signed Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Decode the signing keystore from secrets and drop it at the repo root.
      # Both :app and :tv read it via rootProject.file("keystore.jks").
      - name: Set up Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > $GITHUB_WORKSPACE/keystore.jks
          echo "Keystore created at: $GITHUB_WORKSPACE/keystore.jks"
          ls -la $GITHUB_WORKSPACE/keystore.jks

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x gradlew

      # Drive versionName/versionCode from the git tag so every release APK
      # actually advertises its real version. Without this both modules read
      # the hard-coded fallback in build.gradle.kts and the in-app auto-
      # updater keeps prompting forever.
      - name: Compute release version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building versionName=${VERSION}"

      - name: Build Signed APKs (phone + TV)
        run: |
          ./gradlew :app:assembleRelease :tv:assembleRelease \
            -PversionName=${{ steps.version.outputs.version }} \
            --stacktrace
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      # Rename each APK so the asset filename embeds the release tag (v1.2.3)
      # and the build flavour ("app" / "tv"). The in-app AppAutoUpdater filters
      # release assets by substring — phone looks for "app", TV looks for "tv".
      - name: Stage release artifacts
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p release-artifacts
          cp app/build/outputs/apk/release/app-release.apk \
             "release-artifacts/torrentplayer-app-${VERSION}.apk"
          cp tv/build/outputs/apk/release/tv-release.apk \
             "release-artifacts/torrentplayer-tv-${VERSION}.apk"
          ls -la release-artifacts/

      - name: Verify APKs exist
        run: |
          test -s app/build/outputs/apk/release/app-release.apk || { echo "phone APK missing"; exit 1; }
          test -s tv/build/outputs/apk/release/tv-release.apk   || { echo "tv APK missing";    exit 1; }

      - name: Upload Signed APKs to Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.version }}"
          tag_name: ${{ github.ref_name }}
          files: |
            release-artifacts/torrentplayer-app-${{ steps.version.outputs.version }}.apk
            release-artifacts/torrentplayer-tv-${{ steps.version.outputs.version }}.apk
          generate_release_notes: true
          draft: false
